name: Ruff diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnostics:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: pip install ruff
      - name: Fix recorder lint findings
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("vinyl/vinyl_recorder_service.py")
          source = path.read_text()
          source = source.replace(
              "from __future__ import annotations\n\nimport logging",
              "from __future__ import annotations\n\nimport contextlib\nimport logging",
          )
          source = source.replace(
              """    def __del__(self) -> None:
                  try:
                      self.stop_recording()
                  except Exception:
                      pass
          """,
              """    def __del__(self) -> None:
                  with contextlib.suppress(Exception):
                      self.stop_recording()
          """,
          )
          source = source.replace(
              """                if self.recording_thread is not None:
                              try:
                                  self.recording_thread.join(timeout=1)
                              except Exception:
                                  pass
          """,
              """                if self.recording_thread is not None:
                              with contextlib.suppress(Exception):
                                  self.recording_thread.join(timeout=1)
          """,
          )
          source = source.replace(
              """            if self.is_paused and os.name != "nt":
                          try:
                              os.kill(process.pid, signal.SIGCONT)
                          except OSError:
                              pass
          """,
              """            if self.is_paused and os.name != "nt":
                          with contextlib.suppress(OSError):
                              os.kill(process.pid, signal.SIGCONT)
          """,
          )
          path.write_text(source)
          PY
          ruff check vinyl/vinyl_recorder_service.py
      - name: Commit recorder lint fix
        run: |
          if git diff --quiet -- vinyl/vinyl_recorder_service.py; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vinyl/vinyl_recorder_service.py
          git commit -m "fix(vinyl): satisfy Ruff diagnostics"
          git push origin "HEAD:${{ github.head_ref }}"
