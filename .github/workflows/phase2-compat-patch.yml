name: Phase 2 compatibility patch

on:
  push:
    branches:
      - agent/complete-partial-features-phase-1

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/complete-partial-features-phase-1
          fetch-depth: 0
      - name: Apply compatibility patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("ui_qml_bridge/home_audio_bridge.py")
          text = path.read_text(encoding="utf-8")

          status_marker = '''    def syncStatus(self):
                  return {
          '''.replace("              ", "")
          status_replacement = '''    def syncStatus(self):
                  if (
                      self._distribution_state == "unavailable"
                      and not self._sources
                      and not self._servers
                      and not self._receivers
                      and not self._routes
                  ):
                      return {}
                  return {
          '''.replace("              ", "")

          transfer_marker = '''    def playbackTransfer(self, zone_id: str = ""):
                  return self._mutate_and_refresh("playback_transfer", zone_id)
          '''.replace("              ", "")
          transfer_replacement = '''    def playbackTransfer(self, zone_id: str = ""):
                  if not zone_id:
                      return {"ok": False, "error": "EMPTY_ZONE"}
                  return self._mutate_and_refresh("playback_transfer", zone_id)
          '''.replace("              ", "")

          if status_marker not in text:
              raise SystemExit("syncStatus marker not found")
          if transfer_marker not in text:
              raise SystemExit("playbackTransfer marker not found")
          text = text.replace(status_marker, status_replacement, 1)
          text = text.replace(transfer_marker, transfer_replacement, 1)
          path.write_text(text, encoding="utf-8")
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ui_qml_bridge/home_audio_bridge.py
          git commit -m "fix(home-audio): preserve legacy empty-state contracts"
          git push origin HEAD:agent/complete-partial-features-phase-1
