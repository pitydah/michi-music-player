name: Phase 2 compatibility patch

on:
  push:
    branches:
      - agent/complete-partial-features-phase-1

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/complete-partial-features-phase-1
          fetch-depth: 0
      - name: Apply compatibility patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("ui_qml_bridge/home_audio_bridge.py")
          text = path.read_text(encoding="utf-8")

          old_status = '''    @Property("QVariant", notify=stateChanged)
              def syncStatus(self):
                  return {
                      "state": self._distribution_state,
                      "latency_ms": self._latency_ms,
                      "offline": self._offline,
                      "active_routes": len(
                          [route for route in self._routes if route.get("state") == "active"]
                      ),
                  }
          '''.replace("              ", "")
          new_status = '''    @Property("QVariant", notify=stateChanged)
              def syncStatus(self):
                  if (
                      self._distribution_state == "unavailable"
                      and not self._sources
                      and not self._servers
                      and not self._receivers
                      and not self._routes
                  ):
                      return {}
                  return {
                      "state": self._distribution_state,
                      "latency_ms": self._latency_ms,
                      "offline": self._offline,
                      "active_routes": len(
                          [route for route in self._routes if route.get("state") == "active"]
                      ),
                  }
          '''.replace("              ", "")

          old_transfer = '''    @Slot(str, result=dict)
              def playbackTransfer(self, zone_id: str = ""):
                  return self._mutate_and_refresh("playback_transfer", zone_id)
          '''.replace("              ", "")
          new_transfer = '''    @Slot(str, result=dict)
              def playbackTransfer(self, zone_id: str = ""):
                  if not zone_id:
                      return {"ok": False, "error": "EMPTY_ZONE"}
                  return self._mutate_and_refresh("playback_transfer", zone_id)
          '''.replace("              ", "")

          if old_status not in text:
              raise SystemExit("syncStatus block not found")
          if old_transfer not in text:
              raise SystemExit("playbackTransfer block not found")
          text = text.replace(old_status, new_status).replace(old_transfer, new_transfer)
          path.write_text(text, encoding="utf-8")
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ui_qml_bridge/home_audio_bridge.py
          git commit -m "fix(home-audio): preserve legacy empty-state contracts"
          git push origin HEAD:agent/complete-partial-features-phase-1
