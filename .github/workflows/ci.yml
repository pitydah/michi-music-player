name: CI

on: [push, pull_request]

env:
  ruff_out: --output-format=github
  compile_exclude: .venv/|\.tmpl\.'

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libfontconfig1 xvfb
          pip install ruff
      - name: Ruff check
        run: ruff check . ${{ env.ruff_out }}
      - name: Compileall
        run: python -m compileall -q -x '${{ env.compile_exclude }}' .
      - name: Import audit
        run: python scripts/audit_qtwidgets_imports.py

  test:
    needs: [lint]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libfontconfig1 xvfb
          pip install -e ".[dev]" build
      - name: Core tests
        run: |
          QT_QPA_PLATFORM=offscreen python -m pytest tests/ -q --timeout=300 \
            --ignore=tests/qml --ignore=tests/test_large_library.py \
            -x --junitxml=results-core.xml
      - name: QML tests
        run: |
          QT_QPA_PLATFORM=offscreen python -m pytest tests/qml/visual_x10/test_controls_runtime.py tests/qml/visual_x10/test_dialog_runtime.py -q --timeout=120 --junitxml=results-qml.xml
      - name: Migration tests
        run: |
          QT_QPA_PLATFORM=offscreen python -m pytest tests/test_migrations.py tests/test_migration_real_data.py -q --timeout=60
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: "*.xml"
          retention-days: 7

  qml-compile:
    needs: [lint]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libfontconfig1
          pip install PySide6
      - name: QML compile check
        run: |
          QT_QPA_PLATFORM=offscreen timeout 30 python3 -c "
      import sys, os; sys.path.insert(0, '.')
      from PySide6.QtQml import QQmlEngine, QQmlComponent
      from PySide6.QtGui import QGuiApplication
      from pathlib import Path
      app = QGuiApplication(sys.argv)
      engine = QQmlEngine()
      class D: pass
      for n in ['appBridge','navigationBridge','themeBridge','queueBridge','libraryBridge','playbackBridge','playlistsBridge','historyBridge','globalSearchBridge','settingsBridge','devicesBridge','notificationBridge','michiAiBridge','commandPaletteBridge','capabilityBridge','jobBridge','desktopBridge','homeBridge']:
          engine.rootContext().setContextProperty(n, D())
      errors = [str(f) for f in sorted(Path('ui_qml').rglob('*.qml')) if QQmlComponent(engine, str(f)).status() != QQmlComponent.Ready]
      if errors:
          for e in errors[:5]: print(f'QML ERROR: {e}')
          sys.exit(1)
      print(f'QML: {len(list(Path(\"ui_qml\").rglob(\"*.qml\")))} compiled OK')
      "

  build:
    needs: [test, qml-compile]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install build twine
      - name: Build wheel
        run: python -m build --wheel
      - name: Verify wheel
        run: |
          python -c "
      import zipfile, glob
      whl = sorted(glob.glob('dist/*.whl'))
      with zipfile.ZipFile(whl[-1]) as z:
          names = z.namelist()
          required = ['michi/', 'audio/', 'core/', 'library/', 'ui_qml/', 'ui_qml_bridge/']
          for pkg in required:
              assert any(n.startswith(pkg) for n in names), f'Missing: {pkg}'
          qml_files = [n for n in names if n.endswith('.qml')]
          print(f'Wheel OK: {len(names)} files, {len(qml_files)} QML')
      "
      - name: Install wheel
        run: |
          pip install dist/*.whl
          python -c "from michi.app_launcher import launch; print('Entry point OK')"
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ github.sha }}
          path: dist/*.whl
      - name: Publish to PyPI (tagged releases only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          twine upload dist/*.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
