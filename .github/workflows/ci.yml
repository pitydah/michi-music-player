            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            python3-numpy python3-mutagen python3-pil
      - name: Create venv
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"
          python3 -m pip install pytest-timeout
      - name: Decommission audit
        run: |
          source .venv/bin/activate
          python scripts/qml_decommission_audit.py
      - name: Widget retirement audit
        run: |
          source .venv/bin/activate
          python scripts/qml_widget_retirement_audit.py

  vertical-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            python3-numpy python3-mutagen python3-pil
      - name: Create venv
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"
          python3 -m pip install pytest-timeout
      - name: QML vertical workflows
        run: |
          source .venv/bin/activate
          QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 python -m pytest tests/qml/workflows -q --timeout=600
      - name: QML tests (all)
        run: |
          source .venv/bin/activate
          QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 pytest tests/qml -q --timeout=300 --junitxml=artifacts/qml-results-v9.xml

  isolation-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            python3-numpy python3-mutagen python3-pil
      - name: Create venv
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"
          python3 -m pip install pytest-timeout
      - name: QML isolation tests (separate processes)
        run: |
          source .venv/bin/activate
          QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 python -m pytest tests/qml -m isolation -n 1 -q --timeout=300

  runtime-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            python3-numpy python3-mutagen python3-pil
      - name: Create venv
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"
          python3 -m pip install pytest-timeout
      - name: Runtime quality audit
        run: |
          source .venv/bin/activate
          QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 python scripts/qml_runtime_quality_audit.py
      - name: Check runtime
        run: |
          source .venv/bin/activate
          python scripts/check_runtime.py

  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            python3-numpy python3-mutagen python3-pil
      - name: Create venv
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"
          python3 -m pip install pytest-timeout
      - name: Performance tests (10k-50k)
        run: |
          source .venv/bin/activate
          QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 pytest tests/perf -q --timeout=600
      - name: Performance benchmark
        run: |
          source .venv/bin/activate
          QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 python scripts/qml_library_benchmark.py

  Evidence-V9:
    runs-on: ubuntu-latest
    needs: [qml-load, qml-instance, qml-interaction, service-graph, context-bindings, widget-dependency, decommission, vertical-workflows, isolation-workflows, runtime-quality, performance]
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            python3-numpy python3-mutagen python3-pil
      - name: Create venv
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"
          python3 -m pip install pytest-timeout
      - name: Evidence V9 collect
        run: |
          source .venv/bin/activate
          python scripts/qml_evidence_v9_collect.py --junit artifacts/qml-results-v9.xml --expected-sha ${{ github.sha }}
      - name: Manifest V9 generate
        run: |
          source .venv/bin/activate
          python scripts/qml_manifest_v9_generate.py
      - name: Manifest V9 audit
        run: |
          source .venv/bin/activate
          python scripts/qml_manifest_v9_audit.py
      - name: Score V9
        run: |
          source .venv/bin/activate
          python scripts/qml_migration_score_v9.py
      - name: Workflow audit
        run: |
          source .venv/bin/activate
          python scripts/qml_workflow_audit.py
      - name: Save artifacts V9
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qml-evidence-v9-${{ github.sha }}
          path: |
            artifacts/qml-results-v9.xml
            artifacts/qml-evidence-v9.json
            docs/qml_migration_manifest_v9.json

  release-gate:
    needs:
      - lint
      - compile
      - core-tests
      - qml-load
      - qml-instance
      - qml-interaction
      - service-graph
      - context-bindings
      - widget-dependency
      - decommission
      - vertical-workflows
      - isolation-workflows
      - runtime-quality
      - performance
      - Evidence-V9
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Check all jobs passed
        run: |
          echo "All upstream jobs completed — release gate"
          echo "lint: ${{ needs.lint.result }}"
          echo "compile: ${{ needs.compile.result }}"
          echo "core-tests: ${{ needs.core-tests.result }}"
          echo "qml-load: ${{ needs.qml-load.result }}"
          echo "qml-instance: ${{ needs.qml-instance.result }}"
          echo "qml-interaction: ${{ needs.qml-interaction.result }}"
          echo "service-graph: ${{ needs.service-graph.result }}"
          echo "context-bindings: ${{ needs.context-bindings.result }}"
          echo "widget-dependency: ${{ needs.widget-dependency.result }}"
          echo "decommission: ${{ needs.decommission.result }}"
          echo "vertical-workflows: ${{ needs.vertical-workflows.result }}"
          echo "isolation-workflows: ${{ needs.isolation-workflows.result }}"
          echo "runtime-quality: ${{ needs.runtime-quality.result }}"
          echo "performance: ${{ needs.performance.result }}"
          echo "Evidence-V9: ${{ needs.Evidence-V9.result }}"
          FAILED=""
          for job in lint compile core-tests qml-load qml-instance qml-interaction service-graph context-bindings widget-dependency decommission vertical-workflows isolation-workflows runtime-quality performance Evidence-V9; do
            result_var="${{ needs.$job.result }}"
            if [ "$result_var" != "success" ]; then
              FAILED="$FAILED $job"
            fi
          done
          if [ -n "$FAILED" ]; then
            echo "FAIL: Jobs failed:$FAILED"
            exit 1
          fi
          echo "PASS: Release gate passed"
