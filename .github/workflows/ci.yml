name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav gstreamer1.0-tools \
            python3-dbus python3-cairo \
            python3-numpy python3-mutagen

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          # Core deps (PySide6, mutagen, numpy) + dev tools
          # PyGObject, pycairo, dbus-python come from system packages above
          pip install PySide6 mutagen numpy
          pip install pytest pytest-qt ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Compile check
        run: python -m compileall -q .

      - name: Verify icons and data
        run: |
          python3 -c "
          import pathlib
          root = pathlib.Path('.').resolve()
          icons = list(root.rglob('icons/*.svg'))
          print(f'icons/: {len(icons)} SVGs')
          assert len(icons) > 0, 'No SVG icons found'
          "

      - name: Tests (pytest)
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONUNBUFFERED: 1
          MICHI_TEST_DATA_DIR: ${{ runner.temp }}/michi-test-data
          MICHI_TEST_CACHE_DIR: ${{ runner.temp }}/michi-test-cache
          MICHI_TEST_CONFIG_DIR: ${{ runner.temp }}/michi-test-config
        run: pytest -q
