name: CI

"on":
  push:
    branches: [main, michi-core-convergence, qml-production-parity-x10-v2]
  pull_request:
    branches: [main, michi-core-convergence, qml-production-parity-x10-v2]
  workflow_dispatch:

jobs:
  ruff-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --upgrade pip && pip install -e ".[dev]"
      - run: ruff check . --output-format concise

  compile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --upgrade pip && pip install -e ".[dev]"
      - run: python -m compileall -q -x '.venv/|\.tmpl\.' .

  qml-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout
      - run: QT_QPA_PLATFORM=offscreen timeout 120 python scripts/qml_compile_all_v12.py
      - run: QT_QPA_PLATFORM=offscreen timeout 120 python scripts/qml_productive_runtime_v12.py

  qml-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout
      - run: QT_QPA_PLATFORM=offscreen timeout 300 python -m pytest tests/qml -q --timeout=300 -m "not isolation" --junitxml=artifacts/qml-v12.xml

  qml-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout
      - run: python scripts/qml_evidence_v12_collect.py --junit artifacts/qml-v12.xml --expected-sha $(git rev-parse HEAD)

  qml-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout
      - run: python scripts/qml_productive_gate_v12.py

  wheel-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build wheel
      - run: python -m build --wheel
      - run: python -c "
import zipfile, sys
with zipfile.ZipFile('dist/michi_music_player-0.2.0a1-py3-none-any.whl') as z:
    names = [n for n in z.namelist() if not n.endswith('/')]
forbidden = [n for n in names if 'ui/window.py' in n or 'legacy_widgets' in n]
if forbidden:
    print('FAIL: wheel contains forbidden files:', forbidden)
    sys.exit(1)
print('PASS: wheel clean')
"
