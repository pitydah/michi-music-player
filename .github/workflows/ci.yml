name: CI

on:
  push:
    branches: [main, qml-migration-foundation-clean]
  pull_request:
    branches: [main, qml-migration-foundation-clean]

jobs:
  # ── Job 1: packaging — validates pyproject.toml, deps, ruff, compile ──
  packaging:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify metadata
        run: |
          python3 -c "import importlib.metadata; print('michi-music-player', importlib.metadata.version('michi-music-player'))"

      - name: Lint (ruff)
        run: ruff check .

      - name: Compile check
        run: python -m compileall -q -x '.venv/|\.tmpl\.' .

  # ── Job 2: runtime — validates gi/Gst + runs pytest with system Python ──
  runtime:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav gstreamer1.0-tools \
            python3-dbus python3-cairo \
            python3-numpy python3-mutagen python3-pil python3-pil.imagetk

      - name: Create venv (system packages)
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"
          python3 -m pip install pytest-timeout

      - name: Verify PyGObject / GStreamer
        run: |
          source .venv/bin/activate
          python3 << 'PYEOF'
          import sys
          print("Python:", sys.executable)
          try:
              import gi
              gi.require_version("Gst", "1.0")
              gi.require_version("GstPbutils", "1.0")
              from gi.repository import Gst, GstPbutils
              Gst.init(None)
              print("GStreamer OK:", Gst.version_string())
              print("GstPbutils OK:", GstPbutils)
          except Exception as e:
              print("PyGObject/GStreamer import failed:", repr(e))
              raise
          PYEOF

      - name: Verify metadata
        run: |
          source .venv/bin/activate
          python3 -c "import importlib.metadata; print('michi-music-player', importlib.metadata.version('michi-music-player'))"

      - name: Lint (ruff)
        run: |
          source .venv/bin/activate
          ruff check .

      - name: Compile check
        run: |
          source .venv/bin/activate
          python -m compileall -q -x '.venv/|\.tmpl\.' .

      - name: Smoke startup
        run: |
          source .venv/bin/activate
          QT_QPA_PLATFORM=offscreen \
          PYTHONUNBUFFERED=1 \
          MICHI_SAFE_MODE=1 \
          MICHI_TEST_DATA_DIR=${{ runner.temp }}/michi-smoke-data \
          MICHI_TEST_CACHE_DIR=${{ runner.temp }}/michi-smoke-cache \
          MICHI_TEST_CONFIG_DIR=${{ runner.temp }}/michi-smoke-config \
          python3 scripts/smoke_startup.py

      - name: Smoke UI routes
        run: |
          source .venv/bin/activate
          QT_QPA_PLATFORM=offscreen \
          PYTHONUNBUFFERED=1 \
          MICHI_SAFE_MODE=1 \
          MICHI_TEST_DATA_DIR=${{ runner.temp }}/michi-smoke-data \
          MICHI_TEST_CACHE_DIR=${{ runner.temp }}/michi-smoke-cache \
          MICHI_TEST_CONFIG_DIR=${{ runner.temp }}/michi-smoke-config \
          python3 scripts/smoke_ui_routes.py

      - name: Verify icons and data
        run: |
          python3 -c "
          import pathlib
          root = pathlib.Path('.').resolve()
          icons = list(root.rglob('icons/*.svg'))
          print(f'icons/: {len(icons)} SVGs')
          assert len(icons) > 0, 'No SVG icons found'
          "

      - name: Album-focused tests (pure Python, no Qt)
        timeout-minutes: 2
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONUNBUFFERED: 1
        run: |
          source .venv/bin/activate
          python3 -m pytest \
            tests/test_album_final_closure.py \
            tests/test_album_repository.py \
            tests/test_album_repository_grouping_hard.py \
            tests/test_album_identity.py \
            tests/test_album_quality_service.py \
            tests/test_album_duplicate_service.py \
            tests/test_album_duplicates_library_scope.py \
            tests/test_album_controller_actions.py \
            tests/test_album_grid_cover_items.py \
            tests/test_album_detail_identity_resolution.py \
            tests/test_album_micro_server_cancel_rollback.py \
            tests/test_album_mobile_sync_visibility.py \
            tests/test_album_play_next_semantics.py \
            tests/test_player_enqueue_next_semantics.py \
            tests/test_album_server_import_dialog.py \
            -q --timeout=60

      - name: Hybrid Audio Engine tests
        timeout-minutes: 2
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONUNBUFFERED: 1
        run: |
          source .venv/bin/activate
          python3 -m pytest \
            tests/test_no_merge_conflicts.py \
            tests/test_audio_backend_base.py \
            tests/test_gstreamer_backend.py \
            tests/test_hybrid_audio_manager.py \
            tests/test_audio_settings_schema.py \
            tests/test_audio_settings_migrator.py \
            tests/test_alsa_hw_params.py \
            tests/test_bitperfect_verifier.py \
            tests/test_mpd_protocol.py \
            tests/test_mpd_client_mock.py \
            tests/test_mpd_path_mapper.py \
            tests/test_mpd_backend.py \
            tests/test_mpd_config_builder.py \
            tests/test_mpd_service_manager.py \
            tests/test_mpd_discovery.py \
            tests/test_audio_profile_backend_selection.py \
            tests/test_dsp_state.py \
            tests/test_player_service_hybrid.py \
            tests/test_output_profiles_mpd.py \
            tests/test_bitperfect_monitor_page.py \
            tests/test_mpris_hybrid.py \
            tests/test_hybrid_engine_end_to_end.py \
            -q --timeout=60

      - name: Tests (pytest) — anti-regression + packaging + intelligence
        timeout-minutes: 3
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONUNBUFFERED: 1
          MICHI_SAFE_MODE: 1
          MICHI_TEST_DATA_DIR: ${{ runner.temp }}/michi-test-data
          MICHI_TEST_CACHE_DIR: ${{ runner.temp }}/michi-test-cache
          MICHI_TEST_CONFIG_DIR: ${{ runner.temp }}/michi-test-config
        run: |
          source .venv/bin/activate
          python3 -m pytest \
            tests/test_post_refactor_regressions.py \
            tests/test_packaging.py \
            tests/test_home_dashboard_service.py \
            tests/test_home_controller.py \
            tests/test_crash_reporter.py \
            tests/test_ecosystem_doctor.py \
            tests/test_ecosystem_config_planner.py \
            tests/test_ecosystem_diagnostics.py \
            tests/test_section_context_providers.py \
            tests/test_contextual_suggestion_engine.py \
            tests/test_intent_router.py \
            tests/test_audio_conversion_tools.py \
            tests/test_prompt_context_builder.py \
            tests/test_context_suggestion_bar_smoke.py \
            -q --timeout=60

      - name: QML bridge tests (no GUI required)
        timeout-minutes: 2
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONUNBUFFERED: 1
        run: |
          source .venv/bin/activate
          python3 -m pytest tests/qml/ -q --timeout=60

      - name: Performance tests (optional)
        continue-on-error: true
        timeout-minutes: 3
        env:
          QT_QPA_PLATFORM: offscreen
          MICHI_SAFE_MODE: 1
        run: |
          source .venv/bin/activate
          python3 -m pytest tests/perf/ -q -m perf --timeout=120
