      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            python3-numpy python3-mutagen python3-pil
      - name: Create venv
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"
          python3 -m pip install pytest-timeout
      - name: Bridge contract audit
        run: |
          source .venv/bin/activate
          python scripts/qml_bridge_contract_audit.py
      - name: Route registry audit
        run: |
          source .venv/bin/activate
          python scripts/qml_route_registry_audit.py

  widget-dependency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            python3-numpy python3-mutagen python3-pil
      - name: Create venv
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"
          python3 -m pip install pytest-timeout
      - name: Widget dependency audit
        run: |
          source .venv/bin/activate
          python scripts/qml_hybrid_dependency_audit.py
      - name: Bridge contract audit
        run: |
          source .venv/bin/activate
          python scripts/qml_bridge_contract_audit.py
      - name: Route registry audit
        run: |
          source .venv/bin/activate
          python scripts/qml_route_registry_audit.py

  decommission:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
