name: CI

"on":
  push:
    branches: [main, michi-core-convergence]
  pull_request:
    branches: [main, michi-core-convergence]
  workflow_dispatch:

jobs:
  core-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --upgrade pip && pip install -e ".[dev]"
      - run: ruff check core ui_qml_bridge --output-format concise

  core-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --upgrade pip && pip install -e ".[dev]"
      - run: python -m compileall -q -x '.venv/|\.tmpl\.' core ui_qml_bridge

  composition-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout
      - run: QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 python -m pytest tests/qml/composition -q --timeout=120

  launcher-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout
      - run: QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 python -m pytest tests/qml/test_launchers_separados.py tests/qml/test_launchers_definitivos.py tests/qml/composition/test_launchers.py -q --timeout=120

  service-graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - run: python scripts/qml_service_graph_audit.py
      - run: python scripts/qml_productive_service_audit.py

  context-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - run: python scripts/qml_bridge_contract_audit.py
      - run: python scripts/qml_route_registry_audit.py

  jobs-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout
      - run: QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 python -m pytest tests/qml/jobs tests/qml/test_jobs_canonico.py -q --timeout=120

  process-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout
      - run: QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 python -m pytest tests/qml/test_process_controller.py tests/qml/test_app_launcher_separate.py -q --timeout=120

  runtime-persistence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout
      - run: QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 python -m pytest tests/qml/test_runtime_persistence.py tests/qml/test_queue_persistence.py -q --timeout=120

  shutdown-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout
      - run: QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 python -m pytest tests/qml/test_shutdown_active_services.py tests/qml/test_shutdown_completo.py tests/qml/infrastructure/test_shutdown.py -q --timeout=120

  widget-boundary-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - run: python scripts/qml_widget_dependency_audit.py
      - run: python scripts/qml_hybrid_dependency_audit.py
