name: CI

on: [push, pull_request]

jobs:
  qml-migration-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libfontconfig1
      - name: Install Python deps
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install PySide6 ruff pytest
      - name: Ruff check
        run: ruff check . --output-format concise 2>&1 | grep -v 'docs/archive\|docs/migration' | (! grep -E '\.py:')
      - name: Compileall
        run: python -m compileall -q -x '.venv/|\.tmpl\.' .
      - name: Core tests
        run: |
          QT_QPA_PLATFORM=offscreen python -m pytest tests/test_songs_service.py tests/test_library_service.py tests/test_album_service.py tests/test_genres_service.py tests/test_folder_service.py tests/test_metadata_editor_service.py tests/test_library_mutation_service.py tests/test_micro_server_service.py -q
      - name: Productive workflows (without engine)
        run: |
          QT_QPA_PLATFORM=offscreen python -m pytest tests/qml/productive_workflows/test_bridge_structural.py tests/qml/productive_workflows/test_services_real.py tests/qml/productive_workflows/test_action_registry_edge_cases.py tests/qml/productive_workflows/test_home_workflow.py tests/qml/productive_workflows/test_mix_workflow.py tests/qml/productive_workflows/test_playback_workflow.py tests/qml/productive_workflows/test_radio_buffer_play_stop.py tests/qml/productive_workflows/test_search_stale_rejection.py tests/qml/productive_workflows/test_queue_reorder_persist.py tests/qml/productive_workflows/test_diagnostics.py tests/qml/productive_workflows/test_lyrics_load_edit_save.py -q
