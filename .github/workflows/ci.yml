name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: packaging — validates pyproject.toml, deps, ruff, compile ──
  packaging:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify metadata
        run: |
          python3 -c "import importlib.metadata; print('michi-music-player', importlib.metadata.version('michi-music-player'))"

      - name: Lint (ruff)
        run: ruff check .

      - name: Compile check
        run: python -m compileall -q -x '.venv/|\.tmpl\.' .

  # ── Job 2: runtime — validates gi/Gst + runs pytest with system Python ──
  runtime:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav gstreamer1.0-tools \
            python3-dbus python3-cairo \
            python3-numpy python3-mutagen python3-pil python3-pil.imagetk

      - name: Create venv (system packages)
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"

      - name: Verify PyGObject / GStreamer
        run: |
          source .venv/bin/activate
          python3 << 'PYEOF'
          import sys
          print("Python:", sys.executable)
          try:
              import gi
              gi.require_version("Gst", "1.0")
              gi.require_version("GstPbutils", "1.0")
              from gi.repository import Gst, GstPbutils
              Gst.init(None)
              print("GStreamer OK:", Gst.version_string())
              print("GstPbutils OK:", GstPbutils)
          except Exception as e:
              print("PyGObject/GStreamer import failed:", repr(e))
              raise
          PYEOF

      - name: Verify metadata
        run: |
          source .venv/bin/activate
          python3 -c "import importlib.metadata; print('michi-music-player', importlib.metadata.version('michi-music-player'))"

      - name: Lint (ruff)
        run: |
          source .venv/bin/activate
          ruff check .

      - name: Compile check
        run: |
          source .venv/bin/activate
          python -m compileall -q -x '.venv/|\.tmpl\.' .

      - name: Smoke startup
        run: |
          source .venv/bin/activate
          QT_QPA_PLATFORM=offscreen \
          PYTHONUNBUFFERED=1 \
          MICHI_SAFE_MODE=1 \
          MICHI_TEST_DATA_DIR=${{ runner.temp }}/michi-smoke-data \
          MICHI_TEST_CACHE_DIR=${{ runner.temp }}/michi-smoke-cache \
          MICHI_TEST_CONFIG_DIR=${{ runner.temp }}/michi-smoke-config \
          python3 scripts/smoke_startup.py

      - name: Smoke UI routes
        run: |
          source .venv/bin/activate
          QT_QPA_PLATFORM=offscreen \
          PYTHONUNBUFFERED=1 \
          MICHI_SAFE_MODE=1 \
          MICHI_TEST_DATA_DIR=${{ runner.temp }}/michi-smoke-data \
          MICHI_TEST_CACHE_DIR=${{ runner.temp }}/michi-smoke-cache \
          MICHI_TEST_CONFIG_DIR=${{ runner.temp }}/michi-smoke-config \
          python3 scripts/smoke_ui_routes.py

      - name: Verify icons and data
        run: |
          python3 -c "
          import pathlib
          root = pathlib.Path('.').resolve()
          icons = list(root.rglob('icons/*.svg'))
          print(f'icons/: {len(icons)} SVGs')
          assert len(icons) > 0, 'No SVG icons found'
          "

      - name: Tests (pytest)
        timeout-minutes: 5
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONUNBUFFERED: 1
          MICHI_SAFE_MODE: 1
          MICHI_TEST_DATA_DIR: ${{ runner.temp }}/michi-test-data
          MICHI_TEST_CACHE_DIR: ${{ runner.temp }}/michi-test-cache
          MICHI_TEST_CONFIG_DIR: ${{ runner.temp }}/michi-test-config
        run: |
          source .venv/bin/activate
          python3 -m pytest -q --timeout=120

      - name: Performance tests (optional)
        continue-on-error: true
        timeout-minutes: 3
        env:
          QT_QPA_PLATFORM: offscreen
          MICHI_SAFE_MODE: 1
        run: |
          source .venv/bin/activate
          python3 -m pytest -q -m perf --timeout=120
