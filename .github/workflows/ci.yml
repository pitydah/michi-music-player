name: CI

on: [push, pull_request]

env:
  compile_exclude: .venv/|\.tmpl\.'
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Ruff
        run: pip install -q ruff
      - name: Ruff check
        run: ruff check . --output-format=concise 2>&1 | tee ruff.log
      - name: Upload Ruff diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-${{ matrix.python-version }}-${{ github.sha }}
          path: ruff.log
          retention-days: 3
      - name: Compileall
        run: python -m compileall -q -x '${{ env.compile_exclude }}' .
      - name: QML-only gate
        run: python scripts/qml_only_gate.py

  functional-tests:
    needs: [lint]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libegl1 libgl1 libxkbcommon0 libfontconfig1 libgstreamer1.0-0 gstreamer1.0-plugins-base gir1.2-gst-plugins-base-1.0
          pip install -q -e ".[dev]" build
      - name: Functional tests
        run: |
          QT_QPA_PLATFORM=offscreen python -m pytest tests/qml/functional/ -q --timeout=120 -x --junitxml=results-functional.xml
      - name: Core tests
        run: |
          QT_QPA_PLATFORM=offscreen python -m pytest tests/ -q --timeout=300 \
            --ignore=tests/qml --ignore=tests/test_large_library.py \
            --ignore=tests/perf -k "not qt_widget and not QtWidget" \
            -x --junitxml=results-core.xml
      - name: Build wheel
        run: python -m build --wheel
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: "*.xml"
          retention-days: 7
