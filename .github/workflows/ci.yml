name: CI

on:
  push:
    branches: [main, qml-macro-*]
  pull_request:
    branches: [main, qml-macro-*]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check . --output-format concise

  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Compile check
        run: python -m compileall -q -x '.venv/|\.tmpl\.' .

  core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav gstreamer1.0-tools \
            python3-dbus python3-cairo \
            python3-numpy python3-mutagen python3-pil python3-pil.imagetk \
            python3-build
      - name: Create venv (system packages)
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"
          python3 -m pip install pytest-timeout
      - name: Verify PyGObject / GStreamer
        run: |
          source .venv/bin/activate
          python3 << 'PYEOF'
          import sys
          print("Python:", sys.executable)
          try:
              import gi
              gi.require_version("Gst", "1.0")
              gi.require_version("GstPbutils", "1.0")
              from gi.repository import Gst, GstPbutils
              Gst.init(None)
              print("GStreamer OK:", Gst.version_string())
              print("GstPbutils OK:", GstPbutils)
          except Exception as e:
              print("PyGObject/GStreamer import failed:", repr(e))
              raise
          PYEOF
      - name: Core tests
        timeout-minutes: 5
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONUNBUFFERED: 1
          MICHI_SAFE_MODE: 1
        run: |
          source .venv/bin/activate
          python3 -m pytest \
            tests/test_post_refactor_regressions.py \
            tests/test_packaging.py \
            tests/test_schema.py \
            tests/test_format_probe.py \
            tests/test_album_final_closure.py \
            tests/test_album_repository.py \
            tests/test_album_repository_grouping_hard.py \
            tests/test_album_identity.py \
            tests/test_album_quality_service.py \
            tests/test_album_duplicate_service.py \
            tests/test_album_duplicates_library_scope.py \
            tests/test_album_controller_actions.py \
            tests/test_album_grid_cover_items.py \
            tests/test_album_detail_identity_resolution.py \
            tests/test_album_micro_server_cancel_rollback.py \
            tests/test_album_mobile_sync_visibility.py \
            tests/test_album_play_next_semantics.py \
            tests/test_player_enqueue_next_semantics.py \
            tests/test_album_server_import_dialog.py \
            -q --timeout=60

  qml-load:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            python3-numpy python3-mutagen python3-pil
      - name: Create venv
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"
          python3 -m pip install pytest-timeout
      - name: Lint (ruff)
        run: |
          source .venv/bin/activate
          ruff check . --output-format concise
      - name: Compile all
        run: |
          source .venv/bin/activate
          python -m compileall -q -x '.venv/|\.tmpl\.' .
      - name: QML compile all
        run: |
          source .venv/bin/activate
          QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 python scripts/qml_compile_all.py
      - name: QML full runtime smoke
        run: |
          source .venv/bin/activate
          QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 python scripts/qml_full_runtime_smoke.py
      - name: QML composition audit
        run: |
          source .venv/bin/activate
          python scripts/qml_composition_audit.py

  qml-instance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            python3-numpy python3-mutagen python3-pil
      - name: Create venv
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"
          python3 -m pip install pytest-timeout
      - name: QML instance all
        run: |
          source .venv/bin/activate
          QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 python scripts/qml_instance_all.py
      - name: QML productive service audit
        run: |
          source .venv/bin/activate
          python scripts/qml_productive_service_audit.py

  qml-interaction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            python3-numpy python3-mutagen python3-pil
      - name: Create venv
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"
          python3 -m pip install pytest-timeout
      - name: QML interaction real tests
        run: |
          source .venv/bin/activate
          QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 python -m pytest tests/qml/workflows/test_qml_interaction_real.py -q --timeout=600
      - name: Interactive workflows
        run: |
          source .venv/bin/activate
          QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 python -m pytest tests/qml/workflows/test_interactive_workflows.py -q --timeout=300

  service-graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            python3-numpy python3-mutagen python3-pil
      - name: Create venv
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"
          python3 -m pip install pytest-timeout
      - name: Service graph audit
        run: |
          source .venv/bin/activate
          python scripts/qml_productive_service_audit.py
      - name: Hybrid dependency audit
        run: |
          source .venv/bin/activate
          python scripts/qml_hybrid_dependency_audit.py

  widget-dependency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            python3-numpy python3-mutagen python3-pil
      - name: Create venv
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"
          python3 -m pip install pytest-timeout
      - name: Widget dependency audit
        run: |
          source .venv/bin/activate
          python scripts/qml_hybrid_dependency_audit.py
      - name: Bridge contract audit
        run: |
          source .venv/bin/activate
          python scripts/qml_bridge_contract_audit.py
      - name: Route registry audit
        run: |
          source .venv/bin/activate
          python scripts/qml_route_registry_audit.py

  vertical-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            python3-numpy python3-mutagen python3-pil
      - name: Create venv
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"
          python3 -m pip install pytest-timeout
      - name: QML vertical workflows
        run: |
          source .venv/bin/activate
          QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 python -m pytest tests/qml/workflows -q --timeout=600
      - name: QML tests (all)
        run: |
          source .venv/bin/activate
          QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 pytest tests/qml -q --timeout=300 --junitxml=artifacts/qml-results-v8.xml

  isolation-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            python3-numpy python3-mutagen python3-pil
      - name: Create venv
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"
          python3 -m pip install pytest-timeout
      - name: QML isolation tests (separate processes)
        run: |
          source .venv/bin/activate
          QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 python -m pytest tests/qml -m isolation -n 1 -q --timeout=300

  runtime-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            python3-numpy python3-mutagen python3-pil
      - name: Create venv
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"
          python3 -m pip install pytest-timeout
      - name: Runtime quality audit
        run: |
          source .venv/bin/activate
          QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 python scripts/qml_runtime_quality_audit.py
      - name: Check runtime
        run: |
          source .venv/bin/activate
          python scripts/check_runtime.py

  performance-10k-50k:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            python3-numpy python3-mutagen python3-pil
      - name: Create venv
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"
          python3 -m pip install pytest-timeout
      - name: Performance tests (10k-50k)
        run: |
          source .venv/bin/activate
          QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 pytest tests/perf -q --timeout=600

  performance-100k:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            python3-numpy python3-mutagen python3-pil
      - name: Create venv
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"
          python3 -m pip install pytest-timeout
      - name: Library benchmark
        run: |
          source .venv/bin/activate
          QT_QPA_PLATFORM=offscreen MICHI_SAFE_MODE=1 python scripts/qml_library_benchmark.py

  Evidence-V8:
    runs-on: ubuntu-latest
    needs: [qml-load, qml-instance, qml-interaction, vertical-workflows, performance-10k-50k, performance-100k]
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            python3-numpy python3-mutagen python3-pil
      - name: Create venv
        run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"
          python3 -m pip install pytest-timeout
      - name: Evidence V8 collect
        run: |
          source .venv/bin/activate
          python scripts/qml_evidence_v8_collect.py --junit artifacts/qml-results-v8.xml --expected-sha ${{ github.sha }}
      - name: Manifest V8 generate
        run: |
          source .venv/bin/activate
          python scripts/qml_manifest_v8_generate.py
      - name: Manifest V8 audit
        run: |
          source .venv/bin/activate
          python scripts/qml_manifest_v8_audit.py
      - name: Score V8
        run: |
          source .venv/bin/activate
          python scripts/qml_migration_score_v8.py
      - name: Save artifacts V8
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qml-evidence-v8-${{ github.sha }}
          path: |
            artifacts/qml-results-v8.xml
            artifacts/qml-evidence-v8.json
            docs/qml_migration_manifest_v8.json

  release-gate:
    needs:
      - lint
      - compile
      - core-tests
      - qml-load
      - qml-instance
      - qml-interaction
      - service-graph
      - widget-dependency
      - vertical-workflows
      - isolation-workflows
      - runtime-quality
      - performance-10k-50k
      - performance-100k
      - Evidence-V8
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Check all jobs passed
        run: |
          echo "All upstream jobs completed — release gate"
          echo "lint: ${{ needs.lint.result }}"
          echo "compile: ${{ needs.compile.result }}"
          echo "core-tests: ${{ needs.core-tests.result }}"
          echo "qml-load: ${{ needs.qml-load.result }}"
          echo "qml-instance: ${{ needs.qml-instance.result }}"
          echo "qml-interaction: ${{ needs.qml-interaction.result }}"
          echo "service-graph: ${{ needs.service-graph.result }}"
          echo "widget-dependency: ${{ needs.widget-dependency.result }}"
          echo "vertical-workflows: ${{ needs.vertical-workflows.result }}"
          echo "isolation-workflows: ${{ needs.isolation-workflows.result }}"
          echo "runtime-quality: ${{ needs.runtime-quality.result }}"
          echo "performance-10k-50k: ${{ needs.performance-10k-50k.result }}"
          echo "performance-100k: ${{ needs.performance-100k.result }}"
          echo "Evidence-V8: ${{ needs.Evidence-V8.result }}"
          FAILED=""
          for job in lint compile core-tests qml-load qml-instance qml-interaction service-graph widget-dependency vertical-workflows isolation-workflows runtime-quality performance-10k-50k performance-100k Evidence-V8; do
            result_var="\${{ needs.$job.result }}"
            if [ "$result_var" != "success" ]; then
              FAILED="$FAILED $job"
            fi
          done
          if [ -n "$FAILED" ]; then
            echo "FAIL: Jobs failed:$FAILED"
            exit 1
          fi
          echo "PASS: Release gate passed"
