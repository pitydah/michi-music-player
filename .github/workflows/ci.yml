name: CI

"on":
  push:
    branches: [main, qml-real-functional-convergence-x10-v4r, qml-real-functions-x10-v3]
  pull_request:
    branches: [main, qml-real-functional-convergence-x10-v4r, qml-real-functions-x10-v3]
  workflow_dispatch:

jobs:
  qml-product-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout build wheel
      - name: Python compile
        run: python -m compileall -q -x '.venv/|\.tmpl\.' .
      - name: Ruff lint
        run: ruff check . --output-format concise
      - name: QML compile
        run: QT_QPA_PLATFORM=offscreen timeout 120 python scripts/qml_compile_all_v15.py
      - name: QML productive runtime
        run: QT_QPA_PLATFORM=offscreen timeout 120 python scripts/qml_productive_runtime_v15.py
      - name: QML tests
        run: QT_QPA_PLATFORM=offscreen timeout 300 python -m pytest tests/qml -q --timeout=300 -m "not isolation" --junitxml=artifacts/qml-v15.xml
      - name: Evidence V15
        run: python scripts/qml_evidence_v15_collect.py --junit artifacts/qml-v15.xml --expected-sha $(git rev-parse HEAD)
      - name: Gate V15
        run: python scripts/qml_productive_gate_v15.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qml-evidence-v15
          path: artifacts/

  wheel-verify:
    runs-on: ubuntu-latest
    needs: [qml-product-validation]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build wheel
      - run: python -m build --wheel
      - run: python -c "
import zipfile, sys
with zipfile.ZipFile('dist/michi_music_player-0.2.0a1-py3-none-any.whl') as z:
    names = [n for n in z.namelist() if not n.endswith('/')]
forbidden = [n for n in names if 'ui/window.py' in n or 'legacy_widgets' in n]
if forbidden:
    print('FAIL: wheel contains forbidden files:', forbidden)
    sys.exit(1)
print('PASS: wheel clean')
"
