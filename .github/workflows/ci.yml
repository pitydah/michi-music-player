name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install build wheel
      - name: Compile Python
        run: python -m compileall -q -x '.venv/|\.tmpl\.' .
      - name: Lint
        run: ruff check . --output-format concise
      - name: Compile every QML document
        env:
          QT_QPA_PLATFORM: offscreen
        run: timeout 120 python scripts/qml_compile_all_v12.py
      - name: Productive QML runtime
        env:
          QT_QPA_PLATFORM: offscreen
          MICHI_SAFE_MODE: "1"
        run: timeout 120 python scripts/qml_productive_runtime_v12.py
      - name: Productive QML workflows
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          timeout 300 python -m pytest -q --timeout=120 tests/qml/productive_workflows_v12
          python -m pytest -q tests/qml/workflows_parallel/test_connections_workflow.py
          python -m pytest -q tests/qml/workflows_specialized/test_audio_jobs_integration.py
          python -m pytest -q tests/qml/test_functional_elements_migration.py
      - name: Core migration tests
        run: >-
          python -m pytest -q
          tests/test_playlist_io_core.py
          tests/test_wheel_v12.py
          tests/test_schema.py

  wheel-verify:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build wheel
          python -m build --wheel
      - name: Verify QML-only wheel
        run: |
          python - <<'PY'
          import glob
          import zipfile

          wheel = glob.glob("dist/*.whl")[0]
          with zipfile.ZipFile(wheel) as archive:
              names = [name for name in archive.namelist() if not name.endswith("/")]

          qml = [name for name in names if name.endswith(".qml")]
          forbidden = [
              name for name in names
              if name == "ui/window.py" or name.startswith("legacy_widgets/")
          ]
          assert qml, "wheel contains no QML resources"
          assert any(name.endswith("ui_qml/Main.qml") for name in qml), "Main.qml missing"
          assert not forbidden, f"legacy UI leaked into wheel: {forbidden}"
          print(f"PASS: {len(qml)} QML resources, no legacy UI")
          PY

  qml-regression-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Full QML regression audit
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests/qml -q -m "not isolation" --maxfail=100
