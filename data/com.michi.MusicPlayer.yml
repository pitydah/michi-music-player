id: com.michi.MusicPlayer
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
command: michi-music-player
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --share=network
  - --socket=pulseaudio
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.mpris.MediaPlayer2.*
  - --talk-name=org.kde.StatusNotifierWatcher
  - --system-talk-name=org.freedesktop.UPower
modules:
  - name: michi-music-player
    buildsystem: simple
    build-commands:
      - pip install --no-deps --prefix=${FLATPAK_DEST} .
    sources:
      - type: dir
        path: ../
    build-options:
      build-args:
        - --share=network
    modules:
      - name: python3-mutagen
        buildsystem: simple
        build-commands:
          - pip install --no-deps --prefix=${FLATPAK_DEST} mutagen>=1.47
        sources: []
        build-options:
          build-args:
            - --share=network

      - name: python3-numpy
        buildsystem: simple
        build-commands:
          - pip install --no-deps --prefix=${FLATPAK_DEST} numpy>=1.24
        sources: []
        build-options:
          build-args:
            - --share=network

      - name: python3-dbus
        buildsystem: simple
        build-commands:
          - pip install --no-deps --prefix=${FLATPAK_DEST} dbus-python>=1.3
        sources: []
        build-options:
          build-args:
            - --share=network
