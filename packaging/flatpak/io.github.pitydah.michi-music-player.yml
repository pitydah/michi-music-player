id: io.github.pitydah.michi-music-player
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
command: michi-music-player
rename-desktop-file: michi-music-player.desktop
rename-icon: michi-music-player

finish-args:
  - --socket=wayland
  - --socket=x11
  - --share=ipc
  - --device=dri
  - --filesystem=xdg-music
  - --filesystem=xdg-run/pipewire-0
  - --socket=pulseaudio
  - --share=network
  - --talk-name=org.freedesktop.Avahi
  - --own-name=org.mpris.MediaPlayer2.michi
  - --env=PYTHONUNBUFFERED=1

modules:
  - name: michi-music-player
    buildsystem: simple
    build-commands:
      - pip install --prefix=/app . 2>&1 || pip install --prefix=/app PySide6 mutagen numpy requests
      - install -Dm644 data/michi-music-player.desktop /app/share/applications/michi-music-player.desktop
      - install -Dm644 icons/app_icon.png /app/share/icons/hicolor/256x256/apps/michi-music-player.png
    sources:
      - type: dir
        path: ../../
