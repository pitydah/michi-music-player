id: io.github.pitydah.michi-music-player
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
command: michi-music-player
finish-args:
  - --socket=wayland
  - --socket=x11
  - --share=ipc
  - --device=dri
  - --filesystem=home
  - --share=network
modules:
  - name: michi-music-player
    buildsystem: simple
    build-commands:
      - pip install --prefix=/app .
    sources:
      - type: dir
        path: ../../
