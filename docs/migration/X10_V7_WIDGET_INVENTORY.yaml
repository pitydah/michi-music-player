# X10.7 Widget Inventory — final estado de archivos con dependencias QtWidgets

remaining:
  - path: michi/widgets_app.py
    class: main()
    imports: [QApplication]
    business_logic: no (launcher)
    consumers: [scripts/*]
    qml_replacement: python main.py
    status: FROZEN_ADAPTER

  - path: ui/window.py
    class: MainWindow (re-export from legacy)
    imports: [from legacy_widgets]
    business_logic: no (stub)
    status: MINIMAL_STUB

  - path: legacy_widgets/**/*.py (~117 files)
    class: various
    imports: [QtWidgets]
    business_logic: yes (legacy)
    consumers: [michi/widgets_app.py]
    qml_replacement: all QML pages
    status: FROZEN_LEGACY

  - path: core/playback_controller.py
    class: PlaybackController
    imports: [QtCore, QtGui only]
    business_logic: yes (no QtWidgets)
    status: CLEANED

  - path: core/file_actions.py
    class: (functions only)
    imports: [none Qt]
    business_logic: yes (pure)
    status: CLEANED

  - path: library/import_service.py
    class: LibraryImportService
    imports: [none Qt]
    business_logic: yes (pure)
    status: CLEANED

deleted:
  total_production_widgets_removed: ~108
  controllers_moved_to_legacy: 43
  widget_stubs_deleted: 15
  backend_stubs_deleted: 10
  eq_widgets_deleted: 5
  streaming_dialogs_deleted: 2
  integration_dialogs_deleted: 1
  library_widgets_deleted: 2
  window_moved: 1
  ui_stubs_deleted: ~29

qt_widgets_imports_outside_legacy: 0
business_logic_in_legacy_widgets: yes (frozen)
business_logic_in_ui: no
qml_primary_interface: yes
