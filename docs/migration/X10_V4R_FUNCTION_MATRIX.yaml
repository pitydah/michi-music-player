widget_equivalents:
  playback: {path: legacy_widgets/ui/controllers/player_bar_controller.py, status: SAFE_TO_DELETE}
  library: {path: legacy_widgets/ui/controllers/library_controller.py, status: SAFE_TO_DELETE}
  playlists: {path: legacy_widgets/ui/controllers/playlist_controller.py, status: SAFE_TO_DELETE}
  album: {path: legacy_widgets/ui/controllers/album_controller.py, status: SAFE_TO_DELETE}
  artist: {path: legacy_widgets/ui/controllers/artist_controller.py, status: SAFE_TO_DELETE}
  history: {path: legacy_widgets/ui/controllers/history_controller.py, status: SAFE_TO_DELETE}
  devices: {path: legacy_widgets/ui/controllers/devices_controller.py, status: SAFE_TO_DELETE}
  settings: {path: legacy_widgets/ui/controllers/settings_controller.py, status: SAFE_TO_DELETE}
  nowplaying: {path: legacy_widgets/ui/nowplaying_bar.py, status: DELETED}
  sidebar: {path: legacy_widgets/ui/sidebar_widget.py, status: DELETED}
  radio: {path: legacy_widgets/ui/radio_widget.py, status: DELETED}
