# X10.4-R Function Matrix — vertical tracking of legacy→QML migration
# States: MISSING, STATIC, PARTIAL, FUNCTIONAL, PRODUCTIVE, WIDGET_FREE

functions:
  - id: track.play
    domain: playback
    qml: {page: "LibraryPage.qml / NowPlayingPage.qml", control: "playButton", signal: clicked}
    bridge: {class: PlaybackBridge, method: playTrack}
    service: {class: PlayerService, method: play}
    status: PRODUCTIVE

  - id: track.play_next
    domain: queue
    qml: {page: "QueuePage.qml", control: "queueItem.playNext", signal: clicked}
    bridge: {class: QueueBridge, method: playNext}
    service: {class: QueueService, method: play_next}
    status: FUNCTIONAL

  - id: track.enqueue
    domain: queue
    qml: {page: "LibraryPage.qml / SearchPage.qml", control: "contextMenu.enqueue", signal: triggered}
    bridge: {class: QueueBridge, method: enqueue}
    service: {class: QueueService, method: enqueue}
    status: FUNCTIONAL

  - id: track.favorite.toggle
    domain: track
    qml: {page: "NowPlayingPage.qml / LibraryPage.qml", control: "favoriteButton", signal: clicked}
    bridge: {class: NowPlayingBridge, method: toggleFavorite}
    service: {class: TrackActionService, method: toggle_favorite}
    status: FUNCTIONAL

  - id: album.play
    domain: playback
    qml: {page: "AlbumDetailPage.qml", control: "playAlbumButton", signal: clicked}
    bridge: {class: PlaybackBridge, method: playAlbum}
    service: {class: AlbumService, method: play_album}
    status: FUNCTIONAL

  - id: album.enqueue
    domain: queue
    qml: {page: "AlbumDetailPage.qml", control: "enqueueAlbumButton", signal: clicked}
    bridge: {class: QueueBridge, method: enqueueAlbum}
    service: {class: AlbumService, method: queue_album}
    status: FUNCTIONAL

  - id: artist.play
    domain: playback
    qml: {page: "ArtistDetailPage.qml", control: "playArtistButton", signal: clicked}
    bridge: {class: PlaybackBridge, method: playArtist}
    service: {class: ArtistService, method: play_artist}
    status: FUNCTIONAL

  - id: queue.clear
    domain: queue
    qml: {page: "QueuePage.qml", control: "clearQueueButton", signal: clicked}
    bridge: {class: QueueBridge, method: clear}
    service: {class: QueueService, method: clear}
    status: FUNCTIONAL

  - id: queue.save_playlist
    domain: queue
    qml: {page: "QueuePage.qml", control: "saveAsPlaylistButton", signal: clicked}
    bridge: {class: QueueBridge, method: saveAsPlaylist}
    service: {class: QueueService, method: save_as_playlist}
    status: FUNCTIONAL

  - id: playlist.create
    domain: playlist
    qml: {page: "PlaylistsPage.qml", control: "createPlaylistButton", signal: clicked}
    bridge: {class: PlaylistsBridge, method: create}
    service: {class: PlaylistService, method: create_playlist}
    status: FUNCTIONAL

  - id: playlist.delete
    domain: playlist
    qml: {page: "PlaylistsPage.qml", control: "deletePlaylistButton", signal: clicked}
    bridge: {class: PlaylistsBridge, method: delete}
    service: {class: PlaylistService, method: delete_playlist}
    status: FUNCTIONAL

  - id: playlist.add
    domain: playlist
    qml: {page: "PlaylistDetailPage.qml", control: "addTrackButton", signal: clicked}
    bridge: {class: PlaylistsBridge, method: addTrack}
    service: {class: PlaylistService, method: add_track}
    status: FUNCTIONAL

  - id: playlist.import
    domain: playlist
    qml: {page: "PlaylistsPage.qml", control: "importButton", signal: clicked}
    bridge: {class: PlaylistsBridge, method: importM3U}
    service: {class: PlaylistService, method: import_m3u}
    status: FUNCTIONAL

  - id: playlist.export
    domain: playlist
    qml: {page: "PlaylistDetailPage.qml", control: "exportButton", signal: clicked}
    bridge: {class: PlaylistsBridge, method: exportM3U}
    service: {class: PlaylistService, method: export_m3u}
    status: FUNCTIONAL

  - id: history.play
    domain: history
    qml: {page: "HistoryPage.qml", control: "historyPlayButton", signal: clicked}
    bridge: {class: HistoryBridge, method: playEntry}
    service: {class: PlayerService, method: play_file}
    status: FUNCTIONAL

  - id: mix.generate
    domain: mix
    qml: {page: "MixHubPage.qml", control: "generateMixButton", signal: clicked}
    bridge: {class: MixBridge, method: generate}
    service: {class: MixService, method: generate}
    status: FUNCTIONAL

  - id: mix.cancel
    domain: mix
    qml: {page: "MixGeneratorPage.qml", control: "cancelButton", signal: clicked}
    bridge: {class: MixBridge, method: cancel}
    service: {class: MixService, method: cancel}
    status: FUNCTIONAL

  - id: device.discover
    domain: devices
    qml: {page: "DevicesPage.qml", control: "discoverButton", signal: clicked}
    bridge: {class: DevicesBridge, method: discover}
    service: {class: DeviceSyncService, method: discover}
