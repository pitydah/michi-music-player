  - id: connection.discover
    domain: connections
    qml: {page: "ConnectionsPage.qml", control: "discoverButton", signal: clicked}
    bridge: {class: ConnectionsBridge, method: discover}
    service: {class: ConnectionService, method: discover}
    status: FUNCTIONAL

  - id: connection.connect
    domain: connections
    qml: {page: "ConnectionsPage.qml", control: "connectButton", signal: clicked}
    bridge: {class: ConnectionsBridge, method: connect}
    service: {class: ConnectionService, method: connect}
    status: FUNCTIONAL

  - id: connection.disconnect
    domain: connections
    qml: {page: "ConnectionsPage.qml", control: "disconnectButton", signal: clicked}
    bridge: {class: ConnectionsBridge, method: disconnect}
    service: {class: ConnectionService, method: disconnect}
    status: FUNCTIONAL

  - id: home_audio.volume
    domain: home_audio
    qml: {page: "HomeAudioPage.qml", control: "volumeSlider", signal: valueChanged}
    bridge: {class: HomeAudioBridge, method: setVolume}
    service: {class: HomeAudioService, method: set_volume}
    status: FUNCTIONAL

  - id: home_audio.mute
    domain: home_audio
    qml: {page: "HomeAudioPage.qml", control: "muteButton", signal: clicked}
    bridge: {class: HomeAudioBridge, method: mute}
    service: {class: HomeAudioService, method: mute}
    status: FUNCTIONAL

  - id: radio.play
    domain: radio
    qml: {page: "RadioPage.qml", control: "playButton", signal: clicked}
    bridge: {class: RadioBridge, method: play}
    service: {class: RadioService, method: play_station}
    status: FUNCTIONAL

  - id: radio.stop
    domain: radio
    qml: {page: "RadioPage.qml", control: "stopButton", signal: clicked}
    bridge: {class: RadioBridge, method: stop}
    service: {class: RadioService, method: stop}
    status: FUNCTIONAL

  - id: lyrics.load
    domain: lyrics
    qml: {page: "LyricsPage.qml", control: "lyricsPane", signal: active}
    bridge: {class: LyricsBridge, method: getLyrics}
    service: {class: LyricsService, method: get_lyrics}
    status: FUNCTIONAL

  - id: diagnostics.open
    domain: diagnostics
    qml: {page: "DiagnosticsPage.qml", control: "diagnosticsButton", signal: clicked}
    bridge: {class: DiagnosticsBridge, method: refresh}
    service: {class: DiagnosticsService, method: check_all}
