# QWidget Decommission Matrix — Fase 3 BT
# W0_ACTIVE → vista Widgets sigue siendo implementación principal
# W1_FROZEN → no recibe funciones nuevas
# W2_THIN_ADAPTER → solo consume servicios core
# W3_LEGACY_ONLY → solo por launcher legacy
# W4_DETACHED → fuera de imports QML
# W5_REMOVABLE_AFTER_PHYSICAL → eliminable tras validación

