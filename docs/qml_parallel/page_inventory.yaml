# Page Inventory — Michi QML Parallel Migration
# Last updated: 2026-07-14
#
# State legend:
#   MISSING                       Route registered, QML file does not exist
#   SHELL_ONLY                    QML file exists, no bridge connection, no real logic
#   STATIC                        QML renders static content, no interactive controls
#   PARTIAL                       Has onClicked handlers calling bridge methods, but limited
#   FUNCTIONAL                    Full bridge integration, real actions, state management
#   PARITY                        Feature parity with widget equivalent
#   RETIRED_WIDGET_READY          Widget page removed, QML is the sole UI

pages:

  # ============================================================================
  # CORE — Navigation/Primary
  # ============================================================================

  - route: home
    file: ui_qml/pages/home/HomePage.qml
    state: FUNCTIONAL
    bridge: HomeBridge
    models: [homeBridge]
    actions:
      - navigate to library
      - navigate to connections
      - navigate to home_audio
      - navigate to assistant
    keyboard:
      - Keys.onReturnPressed in ContinueCard
      - Keys.onSpacePressed in ContinueCard
      - Keys.onReturnPressed in LibraryStatusCard
      - Keys.onSpacePressed in LibraryStatusCard
      - Keys.onReturnPressed in EcosystemCard
      - Keys.onSpacePressed in EcosystemCard
      - Keys.onReturnPressed in AssistantCard
      - Keys.onSpacePressed in AssistantCard
      - Keys.onReturnPressed in JobsCard
    accessibility:
      - Accessible.role/name on root
      - Accessible.name on Hero, StatusBadge, cards
    widget_equivalent: ui/hubs/home_page.py
    missing:
      - dynamic data (albums/artists/tracks hardcoded to 0)
      - ContinueCard does not show real playback state
      - no error/loading states

