# Domain Parity Inventory — Michi QML Migration
# Generated: July 2026
# Status legend:
#   SHELL_ONLY   = placeholder page, no real bridge integration
#   PARTIAL      = bridge connected but significant missing functions
#   FUNCTIONAL   = core workflow works, some edge cases missing
#   PARITY       = feature-complete with widget equivalent

