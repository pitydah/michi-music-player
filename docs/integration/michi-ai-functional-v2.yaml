plan_schema:
  action_plan:
    fields:
      - plan_id
      - session_id
      - title
      - description
      - intent
      - steps
      - preconditions
      - postconditions
      - risks
      - warnings
      - requires_confirmation
      - confirmation_scope
      - rollback_strategy
      - estimated_cost
      - estimated_duration
      - created_at
      - expires_at
  plan_step:
    fields:
      - step_id
      - tool
      - arguments
      - depends_on
      - preconditions
      - expected_result
      - on_failure
      - rollback
      - timeout
      - cancellable
      - compensate

