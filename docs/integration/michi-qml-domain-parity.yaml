bridges:
  NavigationBridge:
    context: navigationBridge
    properties: [currentRoute, canGoBack, canGoForward]
    signals: [routeChanged, invalidRouteError]
    slots: [navigate, navigateWithParams, back, forward, refreshCurrent]

  HomeBridge:
    context: homeBridge
    properties: [hasPlayback, libraryAlbums, libraryArtists, libraryTracks, sourcesCount, lastScan, activeJobs]
    signals: [dataChanged]
    slots: [refresh]

  LibraryBridge:
    context: libraryBridge
    properties: [state, songCount, albumCount, artistCount, searchQuery]
    signals: [stateChanged, dataChanged]
    slots: [search, clearFilters, refresh, playTrackById, enqueueTrackById, addMedia]

  QueueBridge:
    context: queueBridge
    signals: [dataChanged]
    slots: [refresh, moveItem, undo]

  HistoryBridge:
    context: historyBridge
    properties: [historyModel, historyCount]
    signals: [dataChanged]
    slots: [refresh, playHistoryItem, removeHistoryEvent, clearHistory]

  SettingsBridgeV2:
    context: settingsBridgeV2
    properties: [categories]
    signals: [dataChanged]
    slots: [getValue, setValue, resetValue, resetAll, refresh]

  MetadataBridge:
    context: metadataBridge
    properties: [trackTitle, trackArtist, trackAlbum, hasSelection, fields, artworkStatus, qualitySummary]
    signals: [dataChanged]
    slots: [inspectTrack, applyChanges]

  MichiAIBridge:
    context: michiAIBridge
    properties: [status, suggestions]
    signals: [statusChanged]
    slots: [sendMessage, cancel, refresh]

  LibraryDoctorBridge:
    context: libraryDoctorBridge
    properties: [status, issues, totalChecked, issueCount]
    signals: [dataChanged]
    slots: [refresh, scan, dryRun, repair, cancelScan]

  PlaylistsBridge:
    context: playlistsBridge
    properties: [playlists]
    signals: [dataChanged]
    slots: [refresh, create, addTracks, reorder, export]

objectName_convention: page.section.control

