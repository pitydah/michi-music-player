    capabilities_required: [db]
    status: functional

  settings:
    routes:
      - settings.general
      - settings.appearance
      - settings.playback
      - settings.library
      - settings.accessibility
      - settings.audio
      - settings.about
    pages: 7
    bridge: SettingsBridge
    capabilities_required: []
    status: functional

  queue:
    routes: [queue]
    pages: 7
    bridge: QueueBridge
    capabilities_required: [player_service]
    status: functional

  nowplaying:
    routes: [playback]
    pages: 10
    bridge: NowPlayingBridge
    capabilities_required: [player_service]
    status: functional

  playlists:
    routes: [playlists, playlist_detail]
    pages: 8
    bridge: PlaylistsBridge
    capabilities_required: [db]
    status: placeholder

  lyrics:
    routes: [lyrics]
    pages: 2
    bridge: LyricsBridge
