negative_tests:
  service_unavailable: true
  disconnected_device: true
  insufficient_storage: true
  video_rejected: true
  cancellation_specialized: true
  stale_callback: true
  duplicate_notification: true
  radio_invalid_url: true

accessibility:
  keyboard_navigation: true
  focus_management: true
  accessible_role_name: true
  progress_cancel_error_announcements: true
  dialog_focus_trap: true
  focus_restoration: true
  font_scaling: true
  reduced_motion: true
  all_specialized_pages_covered: true

responsive_breakpoints:
  - width: 1920
    label: wide
  - width: 1366
    label: standard
  - width: 1024
    label: compact
  - width: 900
    label: narrow
  - width: 700
    label: compact_narrow
  - width: 500
    label: narrow
  percent_125: true
  percent_150: true

object_name_convention: "domain.page.control"
object_name_audited: true

frozen_apis:
  file: docs/integration/FROZEN_APIS.md
  includes:
    - bridge_constructors
    - context_names
    - route_ids
    - object_names
    - model_roles
    - error_codes
    - job_interactions

metadata:
